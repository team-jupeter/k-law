<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-Law AI 가상 법원 - 사건 입력</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Malgun Gothic', '맑은 고딕', 'Noto Sans KR', sans-serif; background: #EEF2F7; color: #1A1D21; padding: 24px; }
  .container { max-width: 1000px; margin: 0 auto; }
  .card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  h1, h2, h3 { color: #003E8A; margin-bottom: 16px; }
  textarea, input, select { width: 100%; margin: 8px 0 16px; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; font-family: inherit; }
  /* 원고 주장, 피고 주장, 다툼 없는 사실 높이 증가 */
  #plaintiffClaim, #defendantClaim { min-height: 180px; }  /* 기존 rows=6과 함께 약 4배 높이 */
  #undisputedFacts { min-height: 120px; }
  button { background: #003E8A; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: background 0.2s; }
  button:hover { background: #00286A; }
  button:disabled { background: #aaa; cursor: not-allowed; }
  .status { margin-top: 12px; padding: 10px; border-radius: 8px; font-size: 14px; }
  .flex-buttons { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }
  hr { margin: 20px 0; border: none; border-top: 1px solid #e2e8f0; }
  footer { text-align: center; margin-top: 32px; font-size: 12px; color: #5A6169; }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1>⚖️ K-Law AI 가상 법원</h1>
    <p>사건 정보를 입력하면 AI가 K-Law 방법론(v6.4)에 따라 법리를 분석하고 가상 판결을 생성합니다.</p>
  </div>

  <div class="card">
    <h2>📋 사건 개요 입력</h2>
    <textarea id="facts" rows="6" placeholder="예: 원고 홍길동은 피고 김철수에게 2024년 1월 1일 5천만 원을 대여하였으나, 피고는 변제하지 않아 원고는 대여금 반환을 청구합니다."></textarea>
    <button id="btnExtract">🤖 AI 자동 추출</button>
    <div id="extractStatus" class="status"></div>
  </div>

  <div class="card">
    <h3>📌 추출 및 수정 가능 항목</h3>
    <label>사건 분류:</label>
    <select id="caseType">
      <option value="">선택</option>
      <option value="civil_contract">계약위반</option>
      <option value="civil_damage">손해배상</option>
      <option value="civil_traffic">교통사고</option>
      <option value="family_divorce">이혼·위자료</option>
      <option value="criminal_fraud">사기</option>
    </select>
    <label>청구 금액:</label>
    <input id="claimAmount" placeholder="예: 50,000,000원">
    <label>원고 (신청인):</label>
    <input id="plaintiff" placeholder="원고 성명 또는 법인명">
    <label>피고 (상대방):</label>
    <input id="defendant" placeholder="피고 성명 또는 법인명">
    
    <label>원고의 주장:</label>
    <textarea id="plaintiffClaim" rows="6" placeholder="원고가 주장하는 사실과 법적 근거"></textarea>
    
    <label>피고의 주장:</label>
    <textarea id="defendantClaim" rows="6" placeholder="피고가 주장하는 사실과 법적 근거"></textarea>
    
    <label>다툼 없는 사실 (선택):</label>
    <textarea id="undisputedFacts" rows="4" placeholder="양측이 동의하는 핵심 사실"></textarea>
  </div>

  <div class="flex-buttons">
    <button id="btnVerdict" style="background-color: #1A4A8A;">⚖️ K-Law 가상 판결 생성 (별도 페이지)</button>
  </div>

  <footer>케이로주식회사 · K-Law v6.4 · 가상 판결은 법적 효력이 없습니다.</footer>
</div>

<script>
// API 키
const DS_KEY = 'sk-c2483c15cfc0410aa6865f1efde83730';

function getEl(id) { return document.getElementById(id); }

// AI 자동 추출
async function extractFromFacts() {
  const factsEl = getEl('facts');
  if (!factsEl) { alert('사건 개요 입력창 없음'); return; }
  const facts = factsEl.value.trim();
  if (facts.length < 20) { alert('사건 개요 20자 이상'); return; }
  const btn = getEl('btnExtract');
  const statusDiv = getEl('extractStatus');
  if (btn) btn.disabled = true;
  if (statusDiv) {
    statusDiv.textContent = '🔍 AI 분석 중...';
    statusDiv.style.background = '#E8F0FA';
    statusDiv.style.color = '#003E8A';
  }
  const systemPrompt = `당신은 법률 문서 분석 전문가입니다. 사건 개요에서 다음 7가지 정보를 추출하여 JSON만 출력하세요:
{
  "caseType": "코드",
  "claimAmount": "금액",
  "plaintiff": "원고명",
  "defendant": "피고명",
  "plaintiffClaim": "원고의 주장 요약",
  "defendantClaim": "피고의 주장 요약",
  "undisputedFacts": "다툼 없는 사실 요약"
}
caseType 코드: civil_contract, civil_damage, civil_traffic, family_divorce, criminal_fraud 등. 모르면 civil_contract로 하세요.`;
  try {
    const response = await fetch('https://api.deepseek.com/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${DS_KEY}` },
      body: JSON.stringify({ model: 'deepseek-chat', messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: facts }], temperature: 0.1, max_tokens: 800 })
    });
    if (!response.ok) throw new Error(`API 오류: ${response.status}`);
    const data = await response.json();
    const content = data.choices[0].message.content;
    const jsonMatch = content.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('JSON 파싱 실패');
    const ex = JSON.parse(jsonMatch[0]);
    if (ex.caseType) getEl('caseType').value = ex.caseType;
    if (ex.claimAmount) getEl('claimAmount').value = ex.claimAmount;
    if (ex.plaintiff) getEl('plaintiff').value = ex.plaintiff;
    if (ex.defendant) getEl('defendant').value = ex.defendant;
    if (ex.plaintiffClaim) getEl('plaintiffClaim').value = ex.plaintiffClaim;
    if (ex.defendantClaim) getEl('defendantClaim').value = ex.defendantClaim;
    if (ex.undisputedFacts) getEl('undisputedFacts').value = ex.undisputedFacts;
    if (statusDiv) { statusDiv.textContent = '✅ 추출 완료! 필요 시 직접 수정 가능합니다.'; statusDiv.style.background = '#F0FDF4'; statusDiv.style.color = '#166534'; }
  } catch (err) {
    console.error(err);
    if (statusDiv) { statusDiv.textContent = `❌ 오류: ${err.message}`; statusDiv.style.background = '#FEF2F2'; statusDiv.style.color = '#B91C1C'; }
  } finally { if (btn) btn.disabled = false; }
}

// 판결 페이지로 이동
function goToVerdict() {
  const caseData = {
    facts: getEl('facts')?.value || '',
    caseType: getEl('caseType')?.value || '',
    claimAmount: getEl('claimAmount')?.value || '',
    plaintiff: getEl('plaintiff')?.value || '',
    defendant: getEl('defendant')?.value || '',
    plaintiffClaim: getEl('plaintiffClaim')?.value || '',
    defendantClaim: getEl('defendantClaim')?.value || '',
    undisputedFacts: getEl('undisputedFacts')?.value || ''
  };
  if (!caseData.facts || !caseData.plaintiff || !caseData.defendant) {
    alert('사건 개요, 원고, 피고는 필수입니다.');
    return;
  }
  localStorage.setItem('kLawCaseData', JSON.stringify(caseData));
  window.location.href = 'verdict.html';
}

document.addEventListener('DOMContentLoaded', () => {
  const extractBtn = getEl('btnExtract');
  if (extractBtn) extractBtn.onclick = extractFromFacts;
  const verdictBtn = getEl('btnVerdict');
  if (verdictBtn) verdictBtn.onclick = goToVerdict;
});
</script>
</body>
</html>
