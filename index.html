<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-Law AI 추출 테스트</title>
<style>
  body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
  textarea, input, select { width: 100%; margin: 8px 0 16px; padding: 8px; box-sizing: border-box; }
  button { background: #003E8A; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
  .status { margin-top: 10px; padding: 8px; border-radius: 4px; }
  .card { border: 1px solid #ccc; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
  h2 { margin-top: 0; }
</style>
</head>
<body>

<div class="card">
  <h2>사건 개요 입력</h2>
  <textarea id="facts" rows="6" placeholder="예: 원고 홍길동은 피고 김철수에게 2024년 1월 1일 5천만 원을 대여하였으나, 피고는 변제하지 않아 원고는 대여금 반환을 청구합니다."></textarea>
  <button id="btnExtract">🤖 AI 자동 추출</button>
  <div id="extractStatus" class="status"></div>
</div>

<div class="card">
  <h3>추출 결과 (자동 채워짐)</h3>
  <label>사건 분류:</label>
  <select id="caseType"><option value="">선택</option><option value="civil_contract">계약위반</option><option value="civil_damage">손해배상</option></select>
  <label>청구 금액:</label>
  <input id="claimAmount" placeholder="금액">
  <label>원고:</label>
  <input id="plaintiff" placeholder="원고명">
  <label>피고:</label>
  <input id="defendant" placeholder="피고명">
  <label>원고 주장:</label>
  <textarea id="plaintiffClaim" rows="2"></textarea>
  <label>피고 주장:</label>
  <textarea id="defendantClaim" rows="2"></textarea>
  <label>다툼 없는 사실:</label>
  <textarea id="undisputedFacts" rows="2"></textarea>
</div>

<script>
// API 키 (테스트용)
const DS_KEY = 'sk-c2483c15cfc0410aa6865f1efde83730';

// DOM 요소 가져오기
function getEl(id) { return document.getElementById(id); }

// 추출 함수
async function extractFromFacts() {
  const factsEl = getEl('facts');
  if (!factsEl) {
    console.error('facts 요소 없음');
    alert('facts 요소를 찾을 수 없습니다');
    return;
  }
  const facts = factsEl.value.trim();
  if (facts.length < 20) {
    alert('사건 개요를 20자 이상 입력해주세요.');
    return;
  }

  const btn = getEl('btnExtract');
  const statusDiv = getEl('extractStatus');
  if (btn) btn.disabled = true;
  if (statusDiv) {
    statusDiv.textContent = '🔍 AI 분석 중...';
    statusDiv.style.background = '#E8F0FA';
    statusDiv.style.padding = '8px';
  }

  const systemPrompt = `당신은 법률 문서 분석 전문가입니다. 사건 개요에서 다음 7가지 정보를 추출하여 JSON만 출력하세요:
{
  "caseType": "코드",
  "claimAmount": "금액",
  "plaintiff": "원고명",
  "defendant": "피고명",
  "plaintiffClaim": "원고의 주장 요약",
  "defendantClaim": "피고의 주장 요약",
  "undisputedFacts": "다툼 없는 사실 요약"
}
caseType 코드: civil_contract, civil_damage, civil_traffic 등. 모르면 civil_contract로 하세요.`;

  try {
    const response = await fetch('https://api.deepseek.com/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${DS_KEY}` },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: facts }],
        temperature: 0.1,
        max_tokens: 800
      })
    });
    if (!response.ok) throw new Error(`API 오류: ${response.status}`);
    const data = await response.json();
    const content = data.choices[0].message.content;
    const jsonMatch = content.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('JSON 파싱 실패');
    const ex = JSON.parse(jsonMatch[0]);

    // 필드 채우기
    if (ex.caseType) getEl('caseType').value = ex.caseType;
    if (ex.claimAmount) getEl('claimAmount').value = ex.claimAmount;
    if (ex.plaintiff) getEl('plaintiff').value = ex.plaintiff;
    if (ex.defendant) getEl('defendant').value = ex.defendant;
    if (ex.plaintiffClaim) getEl('plaintiffClaim').value = ex.plaintiffClaim;
    if (ex.defendantClaim) getEl('defendantClaim').value = ex.defendantClaim;
    if (ex.undisputedFacts) getEl('undisputedFacts').value = ex.undisputedFacts;

    if (statusDiv) {
      statusDiv.textContent = '✅ 추출 완료!';
      statusDiv.style.background = '#F0FDF4';
      statusDiv.style.color = '#166534';
    }
  } catch (err) {
    console.error(err);
    if (statusDiv) {
      statusDiv.textContent = `❌ 오류: ${err.message}`;
      statusDiv.style.background = '#FEF2F2';
      statusDiv.style.color = '#B91C1C';
    }
  } finally {
    if (btn) btn.disabled = false;
  }
}

// 페이지 로드 후 버튼에 이벤트 연결
document.addEventListener('DOMContentLoaded', function() {
  const btn = getEl('btnExtract');
  if (btn) {
    btn.onclick = extractFromFacts;
    console.log('버튼 연결 성공');
  } else {
    console.error('버튼(#btnExtract)을 찾을 수 없습니다. HTML에 id="btnExtract"가 있는지 확인하세요.');
    alert('버튼이 없습니다. HTML을 확인해주세요.');
  }
});
</script>
</body>
</html>
