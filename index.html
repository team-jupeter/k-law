<!-- 동일한 상단 배너, 헤더 등 생략 - 기존 유지 -->
<main id="main-content" tabindex="-1">
  <!-- ... page-hero, step-indicator, config-bar 등 동일 ... -->

  <!-- SECTION 1: 사건 정보 입력 -->
  <section id="sec1" class="card" aria-labelledby="sec1-title">
    <div class="card-header">...</div>
    <div class="info-banner info">...</div>
    <div class="form-stack">
      <div class="form-group">
        <label class="form-label" for="facts">사건 개요 (합의된 사실관계) <span class="required-mark">*</span></label>
        <textarea class="field" id="facts" required rows="7"></textarea>
        <div style="display:flex; justify-content:space-between;">
          <span class="field-count"><span id="factsCount">0</span> / 2,000자</span>
          <button type="button" class="btn btn-filled" id="btnExtract" onclick="extractFromFacts()">🤖 AI 자동 추출</button>

      </div>

      <div class="form-row cols-2">

          <label class="form-label" for="caseType">사건 분류 <span class="required-mark">*</span><span id="caseTypeAiBadge" class="ai-badge">AI 추출</span></label>
          <select class="field" id="caseType" required><option value="">선택하십시오</option>...</select>
        </div>
        <div class="form-group">
          <label class="form-label" for="claimAmount">청구 금액 <span id="claimAmountAiBadge" class="ai-badge">AI 추출</span></label>
          <input type="text" class="field" id="claimAmount" placeholder="예: 50,000,000원">
        </div>
      </div>

      <div class="form-row cols-2">
        <div class="form-group">
          <label class="form-label" for="plaintiff">원고 (신청인) <span class="required-mark">*</span><span id="plaintiffAiBadge" class="ai-badge">AI 추출</span></label>
          <input type="text" class="field" id="plaintiff" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="defendant">피고 (상대방) <span class="required-mark">*</span><span id="defendantAiBadge" class="ai-badge">AI 추출</span></label>
          <input type="text" class="field" id="defendant" required>
        </div>
      </div>

      <!-- 새 필드: 다툼이 없는 사실 -->
      <div class="form-group">
        <label class="form-label" for="undisputedFacts">다툼이 없는 사실 <span id="undisputedAiBadge" class="ai-badge">AI 추출</span></label>
        <textarea class="field" id="undisputedFacts" rows="3" placeholder="AI가 사건 개요에서 양측이 동의하는 핵심 사실을 추출합니다."></textarea>
        <span class="form-helper">사건 개요에서 당사자 간 다툼이 없는 사실을 요약합니다.</span>
      </div>

      <div class="form-row cols-2">
        <div class="form-group">
          <label class="form-label" for="plaintiffClaim">원고의 주장 <span class="required-mark">*</span><span id="plaintiffClaimAiBadge" class="ai-badge">AI 추출</span></label>
          <textarea class="field" id="plaintiffClaim" required rows="4"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label" for="defendantClaim">피고의 주장 <span class="required-mark">*</span><span id="defendantClaimAiBadge" class="ai-badge">AI 추출</span></label>
          <textarea class="field" id="defendantClaim" required rows="4"></textarea>
        </div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-outlined" onclick="goSec(0)">← 이전</button>
      <button class="btn btn-filled" onclick="toSec2()">다음: 문서 생성 →</button>
    </div>
  </section>

  <!-- 나머지 섹션 (sec2, sec25, sec3, sec4, sec5) 동일 -->

</main>
<script>

// 확장된 extractFromFacts 함수
async function extractFromFacts() {
  const facts = $('#facts').value.trim();
  if (facts.length < 20) {
    toast('⚠️ 사건 개요를 20자 이상 입력한 후 시도해 주십시오.');
    return;
  }

  const btn = $('#btnExtract');
  const statusEl = $('#extractStatus');
  btn.disabled = true;
  btn.textContent = '⏳ AI 분석 중...';
  statusEl.style.display = 'block';
  statusEl.style.background = 'var(--info-bg)';
  statusEl.style.color = 'var(--info)';
  statusEl.textContent = '🔍 DeepSeek AI가 사건 개요에서 모든 정보를 추출하고 있습니다...';

  const systemPrompt = `당신은 법률 문서 분석 전문가입니다. 사용자가 제공하는 사건 개요에서 아래 7가지 정보를 추출하여 반드시 JSON 형식으로만 응답하십시오(코드블록·마크다운·설명 없이 순수 JSON만):

{
  "caseType": "<아래 코드 중 하나>",
  "claimAmount": "<금액 문자열, 없으면 빈 문자열>",
  "plaintiff": "<원고/신청인 이름>",
  "defendant": "<피고/상대방 이름>",
  "plaintiffClaim": "<원고의 주장 요약 (구체적 법적 주장과 요구사항)>",
  "defendantClaim": "<피고의 주장 요약 (반박 내용)>",
  "undisputedFacts": "<당사자 간 다툼이 없는 핵심 사실 요약 (사건 개요에서 합의된 부분)>"
}

caseType 허용 값: civil_damage, civil_traffic, civil_medical, civil_contract, civil_lease, civil_insurance, family_divorce, family_custody, family_inherit, criminal_fraud, criminal_embezzle, criminal_assault, admin_cancel, admin_compensation

각 주장과 다툼 없는 사실은 사건 개요를 바탕으로 구체적이고 간결하게 작성하십시오.`;

  try {
    const response = await fetch('https://api.deepseek.com/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${DS_KEY}` },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: facts }],
        temperature: 0.1,
        max_tokens: 800
      })
    });
    if (!response.ok) throw new Error(`API 오류 ${response.status}`);
    const data = await response.json();
    const content = data.choices[0].message.content;
    const jsonMatch = content.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('AI 응답에서 JSON을 찾을 수 없습니다.');
    const extracted = JSON.parse(jsonMatch[0]);

    // 필드 채우기
    const validTypes = ['civil_damage','civil_traffic','civil_medical','civil_contract','civil_lease','civil_insurance','family_divorce','family_custody','family_inherit','criminal_fraud','criminal_embezzle','criminal_assault','admin_cancel','admin_compensation'];
    let filled = [];

    if (extracted.caseType && validTypes.includes(extracted.caseType)) {
      $('#caseType').value = extracted.caseType;
      $('#caseTypeAiBadge').style.display = 'inline-block';
      filled.push('사건 분류');
    }
    if (extracted.claimAmount && extracted.claimAmount.trim()) {
      $('#claimAmount').value = extracted.claimAmount.trim();
      $('#claimAmountAiBadge').style.display = 'inline-block';
      filled.push('청구 금액');
    }
    if (extracted.plaintiff && extracted.plaintiff.trim()) {
      $('#plaintiff').value = extracted.plaintiff.trim();
      $('#plaintiffAiBadge').style.display = 'inline-block';
      filled.push('원고');
    }
    if (extracted.defendant && extracted.defendant.trim()) {
      $('#defendant').value = extracted.defendant.trim();
      $('#defendantAiBadge').style.display = 'inline-block';
      filled.push('피고');
    }
    if (extracted.plaintiffClaim && extracted.plaintiffClaim.trim()) {
      $('#plaintiffClaim').value = extracted.plaintiffClaim.trim();
      $('#plaintiffClaimAiBadge').style.display = 'inline-block';
      filled.push('원고 주장');
    }
    if (extracted.defendantClaim && extracted.defendantClaim.trim()) {
      $('#defendantClaim').value = extracted.defendantClaim.trim();
      $('#defendantClaimAiBadge').style.display = 'inline-block';
      filled.push('피고 주장');
    }
    if (extracted.undisputedFacts && extracted.undisputedFacts.trim()) {
      $('#undisputedFacts').value = extracted.undisputedFacts.trim();
      $('#undisputedAiBadge').style.display = 'inline-block';
      filled.push('다툼 없는 사실');
    }

    if (filled.length) {
      statusEl.style.background = 'var(--success-bg)';
      statusEl.style.color = 'var(--success)';
      statusEl.textContent = `✅ AI 자동 추출 완료: ${filled.join(' · ')} — 내용을 확인하고 필요 시 직접 수정하십시오.`;
    } else {
      statusEl.style.background = 'var(--warning-bg)';
      statusEl.style.color = 'var(--warning)';
      statusEl.textContent = '⚠️ 추출할 정보가 부족합니다. 사건 개요를 더 상세히 작성한 후 다시 시도하십시오.';
    }
  } catch (error) {
    statusEl.style.background = 'var(--error-bg)';
    statusEl.style.color = 'var(--error)';
    statusEl.textContent = `❌ 추출 실패: ${error.message}`;
  } finally {
    btn.disabled = false;
    btn.textContent = '🤖 AI 자동 추출';
  }
}

// toSec2 함수 수정: undisputedFacts 추가
function toSec2() {
  const ct = $('#caseType').value;
  const pl = $('#plaintiff').value.trim();
  const df = $('#defendant').value.trim();
  const fc = $('#facts').value.trim();
  const pc = $('#plaintiffClaim').value.trim();
  const dc = $('#defendantClaim').value.trim();
  const uf = $('#undisputedFacts').value.trim(); // 새 필드
  if (!ct || !pl || !df || !fc || !pc || !dc) {
    toast('⚠️ 모든 필수 항목을 입력해 주십시오. (사건 분류/원고/피고/원고주장/피고주장)');
    return;
  }
  caseId = genId();
  $('#caseChip').textContent = `사건번호 ${caseId}`;
  $('#caseChip').classList.add('visible');
  caseData = {
    caseType: ct, plaintiff: pl, defendant: df, facts: fc,
    plaintiffClaim: pc, defendantClaim: dc, undisputedFacts: uf,
    caseId, claimAmount: $('#claimAmount').value
  };
  renderDoc();
  goSec(2);
}

// 나머지 함수들 (runAnalysis 등)은 그대로 유지 (추가 정보 요청 시 undisputedFacts 등도 포함됨)

</script>
