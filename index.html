<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>K-Law AI 가상 법원 (테스트)</title>
<style>
  body { font-family: sans-serif; padding: 20px; }
  textarea, input, select { width: 100%; margin: 8px 0; padding: 8px; }
  button { margin-top: 8px; padding: 8px 16px; background: #003E8A; color: white; border: none; border-radius: 4px; cursor: pointer; }
  .card { border: 1px solid #ccc; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
  .extract-status { margin-top: 8px; font-size: 14px; }
</style>
</head>
<body>

<div class="card">
  <h2>사건 정보 입력</h2>
  <label>사건 개요:</label>
  <textarea id="facts" rows="6" placeholder="예: 원고 A는 피고 B에게 2024년 1월 1일 5천만 원을 대여하였으나, 피고는 변제하지 않아 원고는 대여금 반환을 청구합니다."></textarea>
  <button id="btnExtract">🤖 AI 자동 추출</button>
  <div id="extractStatus" class="extract-status"></div>

  <hr>
  <h3>추출 결과 (자동 채워짐)</h3>
  <label>사건 분류:</label>
  <select id="caseType"><option value="">선택</option><option value="civil_contract">계약위반</option></select>
  <label>청구 금액:</label>
  <input id="claimAmount" placeholder="금액">
  <label>원고:</label>
  <input id="plaintiff" placeholder="원고">
  <label>피고:</label>
  <input id="defendant" placeholder="피고">
  <label>원고 주장:</label>
  <textarea id="plaintiffClaim" rows="2"></textarea>
  <label>피고 주장:</label>
  <textarea id="defendantClaim" rows="2"></textarea>
  <label>다툼 없는 사실:</label>
  <textarea id="undisputedFacts" rows="2"></textarea>
</div>

<script>
// API 키 (노출 허용)
const DS_KEY = 'sk-c2483c15cfc0410aa6865f1efde83730';

// DOM 요소 접근 함수
const $ = id => document.getElementById(id);

// 추출 함수
async function extractFromFacts() {
  const factsElem = $('#facts');
  if (!factsElem) { alert('facts 요소 없음'); return; }
  const facts = factsElem.value.trim();
  if (facts.length < 20) {
    alert('사건 개요를 20자 이상 입력하세요');
    return;
  }

  const btn = $('#btnExtract');
  const statusDiv = $('#extractStatus');
  if (btn) {
    btn.disabled = true;
    btn.innerText = '⏳ 추출 중...';
  }
  if (statusDiv) {
    statusDiv.style.display = 'block';
    statusDiv.innerText = 'AI 분석 중...';
    statusDiv.style.background = '#E8F0FA';
    statusDiv.style.padding = '8px';
  }

  const systemPrompt = `당신은 법률 문서 분석 전문가입니다. 사건 개요에서 다음 7가지 정보를 추출하여 JSON만 출력하세요:
{
  "caseType": "코드",
  "claimAmount": "금액",
  "plaintiff": "원고명",
  "defendant": "피고명",
  "plaintiffClaim": "원고의 주장 요약",
  "defendantClaim": "피고의 주장 요약",
  "undisputedFacts": "다툼 없는 사실 요약"
}
caseType 코드: civil_contract, civil_damage 등 (없으면 civil_contract)`;

  try {
    const response = await fetch('https://api.deepseek.com/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${DS_KEY}` },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: facts }],
        temperature: 0.1,
        max_tokens: 800
      })
    });
    if (!response.ok) throw new Error(`API 오류: ${response.status}`);
    const data = await response.json();
    const content = data.choices[0].message.content;
    const jsonMatch = content.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('JSON 추출 실패');
    const extracted = JSON.parse(jsonMatch[0]);

    // 필드 채우기
    if (extracted.caseType) $('#caseType').value = extracted.caseType;
    if (extracted.claimAmount) $('#claimAmount').value = extracted.claimAmount;
    if (extracted.plaintiff) $('#plaintiff').value = extracted.plaintiff;
    if (extracted.defendant) $('#defendant').value = extracted.defendant;
    if (extracted.plaintiffClaim) $('#plaintiffClaim').value = extracted.plaintiffClaim;
    if (extracted.defendantClaim) $('#defendantClaim').value = extracted.defendantClaim;
    if (extracted.undisputedFacts) $('#undisputedFacts').value = extracted.undisputedFacts;

    if (statusDiv) {
      statusDiv.style.background = '#F0FDF4';
      statusDiv.style.color = '#166534';
      statusDiv.innerText = '✅ 추출 완료!';
    }
  } catch (err) {
    console.error(err);
    if (statusDiv) {
      statusDiv.style.background = '#FEF2F2';
      statusDiv.style.color = '#B91C1C';
      statusDiv.innerText = `오류: ${err.message}`;
    }
  } finally {
    if (btn) {
      btn.disabled = false;
      btn.innerText = '🤖 AI 자동 추출';
    }
  }
}

// 버튼에 이벤트 연결 (HTML 로드 후)
window.addEventListener('DOMContentLoaded', () => {
  const btn = $('#btnExtract');
  if (btn) btn.onclick = extractFromFacts;
  else console.error('버튼 없음');
});
</script>
</body>
</html>
